services:

  # ── Ollama — AI model server ──────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: aavapt-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── FastAPI Backend ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aavapt-backend
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_DIR=/app/memory/chromadb
    volumes:
      - ./memory:/app/memory
      - ./history:/app/history
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend — nginx serves the static HTML tool ─────────────
  frontend:
    image: nginx:alpine
    container_name: aavapt-frontend
    ports:
      - "8181:80"
    volumes:
      - ./nessus-analyzer.html:/usr/share/nginx/html/nessus-analyzer.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
    # Persists downloaded AI models between container restarts
